server:
	verbosity: 7
	# num-threads: 1
	interface: 127.0.0.1
	port: @PORT@
	use-syslog: no
	directory: ""
	pidfile: "unbound.pid"
	chroot: ""
	username: ""
	do-not-query-localhost: no
	use-caps-for-id: no

stub-zone:
	name: "."
	stub-addr: 127.0.0.1@@TOPORT@

remote-control:
	control-enable: yes
	control-interface: @CONTROL_PATH@/controlpipe.@CONTROL_PID@
	control-use-cert: no

auth-zone:
	name: "example.com"
	for-upstream: yes
	for-downstream: yes
	allow-notify: notif.example.net
	zonefile: "example.com.zone"
	master: "127.0.0.1@@TOPORT@"
auth-zone:
	name: "example2.com"
	for-upstream: yes
	for-downstream: yes
	master: prim.example.net
