server:
	verbosity: 4
	num-threads: 1
	interface: 127.0.0.1
	port: @PORT@
	use-syslog: no
	directory: .
	pidfile: "unbound.pid"
	chroot: ""
	username: ""
	do-not-query-localhost: no
	incoming-num-tcp: 20
	tcp-connection-limit: 0.0.0.0/0 3
	local-data: "www1.example.net. A 10.20.30.41"
	local-data: "www2.example.net. A 10.20.30.42"
	local-data: "www3.example.net. A 10.20.30.43"
	local-data: "www4.example.net. A 10.20.30.44"
	local-data: "www5.example.net. A 10.20.30.45"
	local-data: "www6.example.net. A 10.20.30.46"
	local-data: "www7.example.net. A 10.20.30.47"
	local-data: "www8.example.net. A 10.20.30.48"

forward-zone:
	name: "."
	forward-addr: "127.0.0.1@@TOPORT@"
