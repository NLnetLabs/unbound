server:
	verbosity: 7
	# num-threads: 1
	interface: 127.0.0.1
	port: @PORT@
	use-syslog: no
	directory: ""
	pidfile: "unbound.pid"
	chroot: ""
	username: ""
	do-not-query-localhost: no
	use-caps-for-id: no

auth-zone:
	name: "example.com"
	for-upstream: yes
	for-downstream: yes
	master: "127.0.0.1@@TOPORT@"
	max-transfer-size: 512
	max-transfer-time: 2000
auth-zone:
	name: "example2.com"
	for-upstream: yes
	for-downstream: yes
	master: "127.0.0.1@@TOPORT2@"
	max-transfer-size: 512
	max-transfer-time: 2000
remote-control:
	control-enable: yes
	control-interface: @CONTROL_PATH@/controlpipe.@CONTROL_PID@
	control-use-cert: no

