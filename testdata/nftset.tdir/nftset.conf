server:
	verbosity: 3
	num-threads: 1
	module-config: "nftset iterator"
	outgoing-range: 16
	interface: 127.0.0.1
	port: @PORT@
	use-syslog: no
	directory: ""
	pidfile: "unbound.pid"
	chroot: ""
	username: ""
	do-not-query-localhost: no
	local-zone: "example.net." nftset
	local-zone: "example.com." nftset
stub-zone:
	name: "example.net."
	stub-addr: "127.0.0.1@@TOPORT@"
stub-zone:
	name: "example.com."
	stub-addr: "127.0.0.1@@TOPORT@"
stub-zone:
	name: "lookslikeexample.net."
	stub-addr: "127.0.0.1@@TOPORT@"
nftset:
	family: inet
	table: nfttest
	name-v4: atotallymadeupnamefor4
	name-v6: atotallymadeupnamefor6
	set: "example.com." "custom_v4" "custom_v6"
